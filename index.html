<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="お買い物リスト">
    <title>お買い物リスト v12</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- パスワードログイン -->
    <div id="login-overlay" class="overlay" style="display:none;">
        <div class="overlay-box">
            <div class="overlay-icon">🛍️</div>
            <h2>お買い物リスト</h2>
            <p>パスワードを入力してください</p>
            <input type="password" id="login-password" placeholder="パスワード" autocomplete="current-password">
            <button id="login-btn" class="btn-primary">ログイン</button>
            <p id="login-error" class="error-msg"></p>
        </div>
    </div>

    <!-- 初回ユーザー設定 -->
    <div id="user-config-overlay" class="overlay" style="display:none;">
        <div class="overlay-box">
            <div class="overlay-icon">✨</div>
            <h2>はじめに登録</h2>
            <p>なまえとアイコンを選んでね</p>
            <input type="text" id="config-user-name" placeholder="なまえ" maxlength="10">
            <div class="icon-selector" id="config-icon-selector"></div>
            <button id="config-save-btn" class="btn-primary">保存して開始</button>
            <p id="config-error" class="error-msg"></p>
        </div>
    </div>

    <div class="app-container" id="main-app" style="display:none;">
        <header>
            <div class="header-top">
                <div class="user-badge" id="current-user-badge" title="プロフィール変更">
                    <span id="current-user-display">読み込み中...</span>
                </div>
                <div class="title-area">
                    <h1>お買い物リスト v12</h1>
                    <button id="refresh-data-btn" class="btn-icon" title="更新">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                </div>
                <div class="header-buttons">
                    <!-- ハンバーガーメニュー -->
                    <button id="hamburger-btn" class="btn-icon" title="メニュー">
                        <i class="bi bi-list"></i>
                    </button>
                    <div id="hamburger-menu" class="hamburger-menu" style="display:none;">
                        <button id="backup-btn" class="menu-item">
                            <i class="bi bi-box-arrow-down"></i> エクスポート
                        </button>
                        <label for="restore-input" class="menu-item" style="cursor:pointer;">
                            <i class="bi bi-box-arrow-in-down"></i> インポート
                        </label>
                        <input type="file" id="restore-input" accept=".json" style="display:none;">
                        <div class="menu-divider"></div>
                        <button id="logout-btn" class="menu-item menu-item-danger">
                            <i class="bi bi-box-arrow-right"></i> ログアウト
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="list">買い物リスト</button>
            <button class="tab-btn" data-tab="person">人物別</button>
            <button class="tab-btn" data-tab="map">地図</button>
        </nav>

        <!-- 買い物リストタブ -->
        <div id="list-tab" class="tab-content active">
            <div class="list-header">
                <h2>買い物リスト</h2>
                <div class="list-controls">
                    <button id="open-add-modal-btn" class="btn-add">＋ 追加</button>
                    <select id="sort-option" onchange="renderShoppingList()">
                        <option value="spaceNo">スペース順</option>
                        <option value="name">商品名順</option>
                        <option value="price">価格順</option>
                        <option value="created">追加順</option>
                    </select>
                </div>
            </div>

            <div class="list-stats">
                <div class="stat-item"><span class="stat-label">合計</span><span id="total-amount" class="stat-value">¥0</span></div>
                <div class="stat-item"><span class="stat-label">個数</span><span id="item-count" class="stat-value">0</span></div>
                <div class="stat-item"><span class="stat-label">場所</span><span id="space-count" class="stat-value">0</span></div>
            </div>

            <div class="view-toggles">
                <button id="toggle-all-btn" class="btn-small">全て閉じる</button>
            </div>

            <div id="shopping-items"></div>
        </div>

        <!-- 人物別タブ -->
        <div id="person-tab" class="tab-content">
            <div class="list-header">
                <h2>人物別まとめ</h2>
            </div>
            <div id="person-accordion-container"></div>
        </div>

        <!-- 地図タブ -->
        <div id="map-tab" class="tab-content">
            <div class="map-controls">
                <input type="file" id="map-upload" accept="image/*,.svg">
                <button id="clear-map" class="btn-danger">地図削除</button>
            </div>
            <div class="map-container">
                <div id="map-display"><p>地図をアップロードしてください</p></div>
            </div>
        </div>

        <!-- 追加モーダル -->
        <div id="add-item-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>新しいアイテムを追加</h3>
                    <button class="btn-close" onclick="closeAddModal()">×</button>
                </div>
                <form id="add-item-form">
                    <div class="form-group"><label>スペースNo</label><input type="text" id="space-no" required></div>
                    <div class="form-group"><label>商品名</label><input type="text" id="item-name" required></div>
                    <div class="form-row">
                        <div class="form-group"><label>価格</label><input type="number" id="item-price" value="0" min="0"></div>
                        <div class="form-group"><label>数量</label><input type="number" id="item-quantity" value="1" min="1"></div>
                    </div>
                    <div class="form-group"><label>備考</label><textarea id="item-notes" rows="2"></textarea></div>
                    <div class="form-group">
                        <label>画像</label>
                        <input type="file" id="item-image" accept="image/*">
                        <div id="image-preview" class="img-preview"></div>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-cancel" onclick="closeAddModal()">キャンセル</button>
                        <button type="submit" class="btn-primary">追加</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 編集モーダル -->
        <div id="edit-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>アイテム編集</h3>
                    <button class="btn-close" onclick="closeEditModal()">×</button>
                </div>
                <form id="edit-item-form">
                    <input type="hidden" id="edit-item-id">
                    <div class="form-group"><label>スペースNo</label><input type="text" id="edit-space-no" required></div>
                    <div class="form-group"><label>商品名</label><input type="text" id="edit-item-name" required></div>
                    <div class="form-row">
                        <div class="form-group"><label>価格</label><input type="number" id="edit-item-price" min="0"></div>
                        <div class="form-group"><label>数量</label><input type="number" id="edit-item-quantity" min="1"></div>
                    </div>
                    <div class="form-group"><label>備考</label><textarea id="edit-item-notes" rows="2"></textarea></div>
                    <div class="form-group">
                        <label>画像変更</label>
                        <input type="file" id="edit-item-image" accept="image/*">
                        <div id="edit-image-preview" class="img-preview"></div>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-cancel" onclick="closeEditModal()">戻る</button>
                        <button type="submit" class="btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/script.js"></script>
</body>
</html>
